name: Publish Core Personas

# Publishes the @agentworkforce/personas-core bundle. Separate from publish.yml
# (the lockstep code packages) and publish-internal-personas.yml (the per-persona
# @agentworkforce/persona-* packs).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (ignored if custom_version is set)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
          - none
      custom_version:
        description: 'Exact version (e.g. 0.8.0). Overrides version type when set.'
        required: false
      prerelease_id:
        description: 'Prerelease identifier for pre* bumps (e.g. "next", "beta")'
        required: false
        default: next
      tag:
        description: 'npm dist-tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
      dry_run:
        description: 'Dry run (no actual publish, no version commit, no git tag)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-personas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @agentworkforce/personas-core
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      npm_name: ${{ steps.package.outputs.npm_name }}
      tag_name: personas-core-v${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Resolve package
        id: package
        run: |
          echo "pkg=personas-core" >> "$GITHUB_OUTPUT"
          echo "path=packages/personas-core" >> "$GITHUB_OUTPUT"
          NPM_NAME=$(node -p 'require("./packages/personas-core/package.json").name')
          echo "npm_name=$NPM_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate personas
        run: pnpm --filter "${{ steps.package.outputs.npm_name }}" run lint

      - name: Bump version
        id: bump
        working-directory: packages/personas-core
        run: |
          CUSTOM='${{ github.event.inputs.custom_version }}'
          BUMP='${{ github.event.inputs.version }}'
          PREID='${{ github.event.inputs.prerelease_id }}'

          if [ -n "$CUSTOM" ]; then
            npm version "$CUSTOM" --no-git-tag-version --allow-same-version
          elif [ "$BUMP" = "none" ]; then
            : # keep existing version
          elif [[ "$BUMP" == pre* ]]; then
            npm version "$BUMP" --no-git-tag-version --preid="$PREID"
          else
            npm version "$BUMP" --no-git-tag-version
          fi

          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version is not yet published
        run: |
          set -euo pipefail
          NPM_NAME='${{ steps.package.outputs.npm_name }}'
          VERSION='${{ steps.bump.outputs.version }}'
          EXISTS=$(npm view "$NPM_NAME@$VERSION" version 2>/dev/null || true)
          if [ -n "$EXISTS" ]; then
            echo "::error title=Version already published::$NPM_NAME@$VERSION is already on npm. Pick a different bump type or set custom_version to a higher version."
            exit 1
          fi
          echo "$NPM_NAME@$VERSION: unpublished - OK"

      - name: Commit version bump
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/personas-core/package.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): ${{ steps.package.outputs.npm_name }}@${{ steps.bump.outputs.version }}"
          fi

      # npm >= 11.5.1 is required for the OIDC trusted-publisher flow.
      - name: Install latest npm
        run: npm install -g npm@latest

      # This workflow uses npm trusted publishing, not NPM_TOKEN. Register
      # `.github/workflows/publish-persona.yml` as a trusted publisher for
      # @agentworkforce/personas-core before the first real publish.
      - name: Pack + publish
        run: |
          set -euo pipefail
          PACK_DIR="$RUNNER_TEMP/packs"
          mkdir -p "$PACK_DIR"

          NPM_NAME='${{ steps.package.outputs.npm_name }}'
          VERSION='${{ steps.bump.outputs.version }}'
          TARBALL_BASENAME="$(echo "${NPM_NAME#@}" | tr '/' '-')-${VERSION}.tgz"

          COMMON_FLAGS="--access public --tag ${{ github.event.inputs.tag }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            COMMON_FLAGS+=" --dry-run"
          else
            COMMON_FLAGS+=" --provenance"
          fi

          echo "==> Packing $NPM_NAME"
          pnpm --filter "$NPM_NAME" pack --pack-destination "$PACK_DIR"

          TARBALL="$PACK_DIR/$TARBALL_BASENAME"
          if [ ! -f "$TARBALL" ]; then
            echo "::error::could not find packed tarball $TARBALL_BASENAME in $PACK_DIR" >&2
            ls -la "$PACK_DIR" >&2 || true
            exit 1
          fi

          echo "==> Publishing $TARBALL $COMMON_FLAGS"
          npm publish "$TARBALL" $COMMON_FLAGS

      - name: Tag + push
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
        run: |
          git tag -a "personas-core-v${{ steps.bump.outputs.version }}" -m "${{ steps.package.outputs.npm_name }}@${{ steps.bump.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Summary
        run: |
          {
            echo "### Published personas"
            echo ""
            echo "- **package**: \`${{ steps.package.outputs.npm_name }}@${{ steps.bump.outputs.version }}\`"
            echo "- **dist-tag**: \`${{ github.event.inputs.tag }}\`"
            echo "- **dry run**: \`${{ github.event.inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  create-release:
    name: Create GitHub Release
    needs: publish
    if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.publish.outputs.tag_name }}

      - name: Build release notes
        id: notes
        run: |
          cat > /tmp/build-persona-release-notes.mjs << 'GENEOF'
          import { appendFileSync, readdirSync, readFileSync, writeFileSync } from 'node:fs';
          import { join } from 'node:path';

          const packageRoot = 'packages/personas-core';
          const pkg = JSON.parse(readFileSync(join(packageRoot, 'package.json'), 'utf8'));
          const personasDir = join(packageRoot, 'personas');
          const files = readdirSync(personasDir).filter((name) => name.endsWith('.json')).sort();

          const lines = [
            '## Package',
            '',
            `- \`${pkg.name}@${pkg.version}\``,
            `- npm dist-tag: \`${process.env.NPM_TAG}\``,
            '',
            '## Personas',
            ''
          ];

          for (const file of files) {
            const persona = JSON.parse(readFileSync(join(personasDir, file), 'utf8'));
            lines.push(`- \`${persona.id}\` - ${persona.description}`);
          }

          writeFileSync('/tmp/persona-release-notes.md', `${lines.join('\n').trimEnd()}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `release_name=${pkg.name}@${pkg.version}\n`);
          GENEOF

          NPM_TAG='${{ github.event.inputs.tag }}' node /tmp/build-persona-release-notes.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.publish.outputs.tag_name }}
          name: ${{ steps.notes.outputs.release_name }}
          body_path: /tmp/persona-release-notes.md
          prerelease: ${{ contains(needs.publish.outputs.version, '-') }}
